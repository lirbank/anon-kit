name: Release

on:
  push:
    branches: ["**"]

permissions:
  contents: read

# One release per branch at a time; never kill a publish in flight
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.check.outputs.version }}
      publish: ${{ steps.check.outputs.publish }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Skip when the version is already on npm
        id: check
        run: |
          version="$(jq -r .version package.json)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          published="$(npm view "anon-kit@$version" version 2>/dev/null || true)"
          if [ -n "$published" ]; then
            echo "anon-kit@$version is already on npm — nothing to publish"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "anon-kit@$version is not on npm — releasing"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Refuse a stable version outside main
        if: steps.check.outputs.publish == 'true' && !contains(steps.check.outputs.version, '-') && github.ref != 'refs/heads/main'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "Stable versions publish from main only — this push is $REF_NAME"
          exit 1

      - name: Refuse a stable version that is not newer than latest
        if: steps.check.outputs.publish == 'true' && !contains(steps.check.outputs.version, '-')
        env:
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          latest="$(npm view anon-kit dist-tags.latest)"
          npx --yes semver@7.8.5 "$VERSION" -r ">$latest" > /dev/null ||
            { echo "Version $VERSION is not newer than latest ($latest)"; exit 1; }

  publish:
    needs: gate
    if: needs.gate.outputs.publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # create the release tag
      id-token: write # npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - run: bun install --frozen-lockfile
      - run: bun run schema && git diff --exit-code
      - run: bun run format:check
      - run: bun run typecheck
      - run: bun run test

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm >= 11.5.1
      - run: npm install -g npm@latest

      # prepublishOnly builds dist/. Auth is GitHub OIDC (no tokens) and npm
      # attaches provenance automatically. Prereleases go under the beta
      # dist-tag so latest always points at a stable version.
      - name: Publish to npm
        env:
          VERSION: ${{ needs.gate.outputs.version }}
        run: |
          case "$VERSION" in
            *-*) npm publish --tag beta ;;
            *) npm publish ;;
          esac

      # --target pins the tag to the released commit; prereleases are marked
      # so GitHub never shows a beta as the latest release.
      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.gate.outputs.version }}
          TARGET: ${{ github.sha }}
        run: |
          case "$VERSION" in
            *-*) prerelease="--prerelease" ;;
            *) prerelease="" ;;
          esac
          gh release create "v$VERSION" --title "v$VERSION" \
            --target "$TARGET" --generate-notes $prerelease
