name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

# One release at a time; never kill a publish in flight
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      publish: ${{ steps.check.outputs.publish }}
    steps:
      - uses: actions/checkout@v7

      - name: Skip when the version is already on npm
        id: check
        run: |
          version="$(jq -r .version package.json)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          published="$(npm view "anon-kit@$version" version 2>/dev/null || true)"
          if [ -n "$published" ]; then
            echo "anon-kit@$version is already on npm — nothing to publish"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "anon-kit@$version is not on npm — releasing"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Refuse a stable version that is not newer than latest
        if: steps.check.outputs.publish == 'true' && !contains(steps.check.outputs.version, '-')
        run: |
          version="${{ steps.check.outputs.version }}"
          latest="$(npm view anon-kit dist-tags.latest)"
          npx --yes semver "$version" -r ">$latest" > /dev/null ||
            { echo "Version $version is not newer than latest ($latest)"; exit 1; }

  publish:
    needs: gate
    if: needs.gate.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release tag
      id-token: write # npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bunx tsc --noEmit

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm >= 11.5.1
      - run: npm install -g npm@latest

      # prepublishOnly builds dist/. Auth is GitHub OIDC (no tokens) and npm
      # attaches provenance automatically. Prereleases go under the beta
      # dist-tag so latest always points at a stable version.
      - name: Publish to npm
        run: |
          version="${{ needs.gate.outputs.version }}"
          case "$version" in
            *-*) npm publish --tag beta ;;
            *) npm publish ;;
          esac

      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ needs.gate.outputs.version }}"
          gh release create "v$version" --title "v$version" --generate-notes
