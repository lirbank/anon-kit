name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check tag matches package.json version
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="v$(jq -r .version package.json)"
          [ "$tag" = "$version" ] || { echo "Release tag $tag does not match package.json $version"; exit 1; }

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun x tsc --noEmit

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm >= 11.5.1
      - run: npm install -g npm@latest

      # prepublishOnly builds dist/. No token needed — auth happens via GitHub
      # OIDC, and npm generates provenance automatically for trusted publishes.
      - run: npm publish
