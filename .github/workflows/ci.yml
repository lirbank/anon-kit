name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      # registry.ts and anon-kit.schema.json are committed build artifacts —
      # regenerate and fail on drift, or a forgotten `bun run schema` ships
      # a CLI missing the new strategy while every test still passes
      - run: bun run schema && git diff --exit-code
      - run: bun run format:check
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build
      # The package runs under node (bin), not bun — smoke the built artifact
      - run: node dist/cli.js --version
